default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args: [--fix]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.29.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: shellcheck
        name: Shellcheck
        entry: shellcheck
        language: system
        types: [shell]

      - id: ty
        name: Type Check (ty)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

      - id: validate-plugins
        name: Validate Plugins
        entry: python3 -S scripts/validate-plugins.py
        language: python
        files: ^(plugins/|scripts/validate-plugins.py|release-please-config.json|.claude-plugin/marketplace.json)
        pass_filenames: false

      - id: update-release-config
        name: Update Release Config
        entry: python3 -S scripts/update_release_config.py
        language: python
        files: ^(plugins/|scripts/update_release_config.py|release-please-config.json|.claude-plugin/marketplace.json|version.txt)
        pass_filenames: false

      - id: validate-settings
        name: Validate Settings
        entry: python3 -S scripts/validate-settings.py
        language: python
        files: \.claude/settings.*\.json$
        pass_filenames: false

      - id: validate-references
        name: Validate Plugin References
        entry: python3 -S scripts/validate-references.py
        language: python
        files: ^plugins/.*\.md$
        pass_filenames: false

