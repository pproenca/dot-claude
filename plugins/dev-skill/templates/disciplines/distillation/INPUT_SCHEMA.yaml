# ============================================================
# SKILL GENERATION INPUT CONFIGURATION (distillation)
# ============================================================
# Fill these in to generate a distilled reference skill.
# The scope of the skill is the WRONG_DEFAULTS list below — not a rule count.

# =============================================================================
# IDENTITY
# =============================================================================

TECHNOLOGY_NAME: ""        # e.g. "React and Next.js", "Go", "the Stripe API"
TECHNOLOGY_SLUG: ""        # e.g. "react", "go", "stripe" (lowercase, no spaces)
ORGANIZATION_NAME: ""      # e.g. "Vercel Engineering", "Acme Platform"
ORGANIZATION_SLUG: ""      # e.g. "vercel", "acme" (lowercase)
PRIMARY_LANGUAGE: ""       # code language for examples (e.g. "typescript", "go")
PERFORMANCE_SKILL: false   # true ONLY if the skill is genuinely about performance
                           # (enables optional impact tiers + quantified metrics)

# =============================================================================
# WRONG DEFAULTS  ← this list IS the scope of the skill
# Each entry becomes (at most) one rule. List what a capable model does WRONG by
# default for this technology. If the model already gets something right, do not
# list it. This list, not a target number, determines how many rules exist.
# =============================================================================

WRONG_DEFAULTS:
  - default: "What the model/engineer does here without guidance"
    why_wrong: "The concrete consequence"
    category: "cat"            # category prefix this belongs to
    foil_needed: false         # true only if the wrong way is a common trap
                               # worth showing as an Incorrect/Correct contrast

# =============================================================================
# CATEGORIES
# Group the wrong defaults. Order by importance (most frequent / most costly
# first). 4-8 categories is typical.
# =============================================================================

CATEGORIES:
  - name: "Category Name"
    prefix: "cat"              # 2-10 char filename prefix
    description: "One sentence: what decisions this category covers"
    # impact: "CRITICAL"       # optional; performance skills only

# =============================================================================
# WHEN TO APPLY  — 3-5 concrete trigger scenarios
# =============================================================================

WHEN_TO_APPLY:
  - "Writing new {{TECHNOLOGY_NAME}} code"
  - "{{Category 1 specific activity}}"
  - "Reviewing {{TECHNOLOGY_NAME}} code"

TRIGGER_KEYWORDS: "keyword1, keyword2, keyword3"

# =============================================================================
# AUTHORITATIVE SOURCES  (primary only — see RECIPE.md "Sources")
# Reject content farms, listicles, undated blogs, and AI SEO filler.
# =============================================================================

SOURCES:
  - url: "https://..."
    purpose: "Official docs / spec / library source / named-expert writing"
    verified: false           # set true once authority + currency + support checked
